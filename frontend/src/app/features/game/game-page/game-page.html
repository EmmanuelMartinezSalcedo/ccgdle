<div class="flex flex-col items-center mt-16 gap-8 select-none">
  <ccgdle-game-challenge-count-badge [count]="432" />
  <div class="mx-auto w-full max-w-xl px-4 sm:px-0">
    <h2 class="text-4xl font-bold text-center">Guess the mysterious card</h2>

    <div class="relative mt-8 w-full">
      <div class="absolute inset-0 -z-10 blur-xl bg-primary/40"></div>

      <label class="input input-primary input-lg sm:input-xl w-full bg-base-300 outline-none">
        <span class="material-symbols-rounded h-[1em] opacity-80"> search </span>
        <input
          type="search"
          class="grow text-neutral-500"
          placeholder="Leeroy Jenkins..."
          [formField]="searchForm.name"
        />
      </label>

      @if (isSearching() || searchResults().length > 0) {
        <ul class="menu bg-base-200 rounded-b-lg w-full mt-0 absolute z-50 shadow-lg">
          @if (isSearching()) {
            <li class="flex items-center justify-center py-3">
              <span class="loading loading-spinner loading-sm opacity-60"></span>
            </li>
          } @else {
            @for (card of searchResults(); track card.id) {
              <li>
                <a (click)="selectCard(card.id)">{{ card.name }}</a>
              </li>
            }
          }
        </ul>
      }
    </div>
  </div>

  @if (gameCard(); as card) {
    <ccgdle-game-grid [gameCard]="card" [attempts]="attempts()" />

    <ccgdle-game-statistics [currentAttempts]="attempts().length" />
  }
</div>
